<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 440px;
  font-family: Arial;
  background: #18181b;
  color: #fff;
  margin: 0;
  padding: 12px;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

.eq-bg {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100%;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: 0 12px;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.eq-bg span {
  flex: 1;
  background: linear-gradient(to top, #3b82f6, transparent);
  border-radius: 2px 2px 0 0;
}

.content {
  position: relative;
  z-index: 1;
}

input[type="range"] {
  -moz-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
}

input[type="range"]::-moz-range-track {
  background: #3f3f46;
  height: 4px;
  border-radius: 2px;
}

input[type="range"]::-moz-range-progress {
  background: #3b82f6;
  height: 4px;
  border-radius: 2px;
}

input[type="range"]::-moz-range-thumb {
  background: #ffffff;
  border: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  box-shadow: none;
  transition: box-shadow 0.15s ease;
}

input[type="range"]:hover::-moz-range-thumb {
  box-shadow: 0 0 8px 2px rgba(59, 130, 246, 0.8);
  transition: .25s;
}

.tab-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.tab-favicon {
  width: 16px;
  height: 16px;
  flex: none;
  border-radius: 2px;
}

.tab-label {
  font-weight: bold;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 110px;
  flex: none;
}

.tab-val {
  min-width: 36px;
  font-size: 12px;
  text-align: right;
  flex: none;
}

.tabs-list {
  max-height: 260px;
  overflow-y: auto;
  margin-bottom: 12px;
}
</style>
</head>
<body>
<div class="eq-bg">
  <span style="height:20%"></span>
  <span style="height:35%"></span>
  <span style="height:50%"></span>
  <span style="height:65%"></span>
  <span style="height:80%"></span>
  <span style="height:95%"></span>
  <span style="height:80%"></span>
  <span style="height:65%"></span>
  <span style="height:50%"></span>
  <span style="height:35%"></span>
  <span style="height:20%"></span>
</div>

<div class="content">
  <div id="tabsList" class="tabs-list"></div>


<script src="dist/popup.js"></script>
</body>
</html>
